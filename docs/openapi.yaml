openapi: 3.1.0
info:
  title: Casa Marana Backend API
  version: 2026-03-02
  description: Compatibility-stabilized API contract for Casa Marana iOS integration.
servers:
  - url: https://casa-marana-backend.vercel.app
components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MenuItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        sectionHint:
          type: string
          enum: [food, drink, other]
      required:
        - id
        - name
        - description
        - price
        - category
        - tags
        - sectionHint
paths:
  /api/health:
    get:
      summary: Backend diagnostics and contract metadata
      responses:
        "200":
          description: Healthy
        "503":
          description: Missing required runtime env vars

  /api/location/sample:
    post:
      summary: Canonical Smart Check-In location sample route
      security:
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: E.164 phone number
                lat:
                  type: number
                lon:
                  type: number
                accuracy:
                  type: number
                  nullable: true
                customerBirthday:
                  type: string
                  nullable: true
                  description: Optional customer birthday in MM/DD/YY format.
                timestamp:
                  type: number
                  description: Unix timestamp in seconds
              required: [phone, lat, lon, timestamp]
      responses:
        "200":
          description: Accepted and stored
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "500":
          description: Backend/storage error

  /api/location/report:
    get:
      summary: Smart Check-In reporting snapshot including birthday coverage and retention health
      security:
        - ApiKeyHeader: []
      parameters:
        - in: query
          name: phone
          schema:
            type: string
          required: false
          description: Optional E.164 phone filter.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
          required: false
          description: Max sample rows returned (default 100).
      responses:
        "200":
          description: Reporting summary and sample rows
        "401":
          description: Unauthorized
        "404":
          description: location_samples table not found
        "500":
          description: Backend/storage error

  /api/loyalty/location:
    post:
      summary: Compatibility alias for Smart Check-In
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Delegates to /api/location/sample
        "401":
          description: Unauthorized

  /api/account/delete:
    post:
      summary: Canonical account deletion endpoint
      security:
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: E.164 phone number
              required: [phone]
      responses:
        "200":
          description: Deletion workflow completed
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized

  /api/auth/account/delete:
    post:
      summary: Deprecated compatibility alias
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Delegates to /api/account/delete with deprecation metadata

  /api/auth/delete-account:
    post:
      summary: Deprecated compatibility alias
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Delegates to /api/account/delete with deprecation metadata

  /api/menu:
    get:
      summary: Canonical normalized menu feed
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Menu payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                  generatedAt:
                    type: string
                    format: date-time
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MenuItem"
                required: [source, generatedAt, items]
        "401":
          description: Unauthorized
        "502":
          description: Square upstream error

  /api/menu/items:
    get:
      summary: Compatibility alias for /api/menu
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Delegates to /api/menu

  /api/catalog/menu:
    get:
      summary: Compatibility alias for /api/menu
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Delegates to /api/menu
